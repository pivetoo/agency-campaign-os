name: Deploy Kanvas

on:
  push:
    branches:
      - main

concurrency:
  group: agency-campaign-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: pivetoo
  API_IMAGE: agency-campaign-api
  WEB_IMAGE: agency-campaign-web

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      - name: Checkout archon framework
        uses: actions/checkout@v4
        with:
          repository: pivetoo/archon-framework
          token: ${{ secrets.GH_PAT }}
          path: frameworks/archon-framework

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: system/agency-campaign-os
          file: system/agency-campaign-os/deploy/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE }}:${{ github.sha }}
          build-contexts: |
            archon-framework=frameworks/archon-framework

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      - name: Checkout archon ui
        uses: actions/checkout@v4
        with:
          repository: pivetoo/archon-ui
          token: ${{ secrets.GH_PAT }}
          path: frameworks/archon-ui

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frameworks/archon-ui/package-lock.json

      - name: Install Archon UI dependencies
        run: npm --prefix "frameworks/archon-ui" ci

      - name: Build Archon UI
        run: npm --prefix "frameworks/archon-ui" run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: system/agency-campaign-os
          file: system/agency-campaign-os/deploy/docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://kanvas.mainstay.com.br/api
            VITE_IDENTITY_MANAGEMENT_URL=https://auth.mainstay.com.br
            VITE_OIDC_CLIENT_ID=agency-campaign-prod
          build-contexts: |
            archon-ui=frameworks/archon-ui

  deploy:
    needs:
      - build-api
      - build-web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      - name: Copy deploy assets to VPS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 4
          retry_wait_seconds: 20
          command: |
            echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
            chmod 600 /tmp/vps_key
            ssh -i /tmp/vps_key -p ${{ secrets.VPS_PORT }} \
              -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'mkdir -p /var/www/kanvas/config'
            scp -i /tmp/vps_key -P ${{ secrets.VPS_PORT }} \
              -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              system/agency-campaign-os/deploy/docker-compose.prod.yml \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/kanvas/docker-compose.prod.yml

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e
            mkdir -p /var/www/kanvas/config
            cd /var/www/kanvas
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
