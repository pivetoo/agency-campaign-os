name: Deploy Kanvas

on:
  push:
    branches:
      - main

concurrency:
  group: agency-campaign-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: pivetoo
  API_IMAGE: agency-campaign-api
  WEB_IMAGE: agency-campaign-web

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      - name: Checkout archon framework
        uses: actions/checkout@v4
        with:
          repository: pivetoo/archon-framework
          token: ${{ secrets.GH_PAT }}
          path: frameworks/archon-framework

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: system/agency-campaign-os
          file: system/agency-campaign-os/deploy/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE }}:${{ github.sha }}
          build-contexts: |
            archon-framework=frameworks/archon-framework

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      - name: Checkout archon ui
        uses: actions/checkout@v4
        with:
          repository: pivetoo/archon-ui
          token: ${{ secrets.GH_PAT }}
          path: frameworks/archon-ui

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frameworks/archon-ui/package-lock.json

      - name: Install Archon UI dependencies
        run: npm --prefix "frameworks/archon-ui" ci

      - name: Build Archon UI
        run: npm --prefix "frameworks/archon-ui" run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: system/agency-campaign-os
          file: system/agency-campaign-os/deploy/docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://kanvas.mainstay.com.br/api
            VITE_IDENTITY_MANAGEMENT_URL=https://auth.mainstay.com.br
            VITE_OIDC_CLIENT_ID=agency-campaign-prod
          build-contexts: |
            archon-ui=frameworks/archon-ui

  deploy:
    needs:
      - build-api
      - build-web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      # Deploy via webhook HTTPS (porta 443) em vez de SSH de entrada: a borda de rede da
      # Hostinger dropa intermitentemente os IPs dos runners do GitHub no SSH, mas o trafego
      # web passa normal. O receiver no VPS (127.0.0.1:9876, publicado pelo nginx em
      # /deploy-hook) autentica por token, grava o compose enviado e roda pull + up -d.
      - name: Trigger deploy via webhook
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 16
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            curl -fsS --max-time 900 -X POST \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
              --data-binary @system/agency-campaign-os/deploy/docker-compose.prod.yml \
              https://kanvas.mainstay.com.br/deploy-hook
