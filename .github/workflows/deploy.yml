name: Deploy Kanvas

on:
  push:
    branches:
      - main

concurrency:
  group: agency-campaign-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: pivetoo
  API_IMAGE: agency-campaign-api
  WEB_IMAGE: agency-campaign-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agency campaign os
        uses: actions/checkout@v4
        with:
          path: system/agency-campaign-os

      - name: Checkout archon framework
        uses: actions/checkout@v4
        with:
          repository: pivetoo/archon-framework
          token: ${{ secrets.GH_PAT }}
          path: frameworks/archon-framework

      - name: Checkout archon ui
        uses: actions/checkout@v4
        with:
          repository: pivetoo/archon-ui
          token: ${{ secrets.GH_PAT }}
          path: frameworks/archon-ui

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build backend
        run: dotnet build "system/agency-campaign-os/AgencyCampaign/AgencyCampaign.Api/AgencyCampaign.Api.csproj" -c Release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frameworks/archon-ui/package-lock.json
            system/agency-campaign-os/AgencyCampaign/AgencyCampaign.Web/package-lock.json

      - name: Install Archon UI dependencies
        run: npm --prefix "frameworks/archon-ui" ci

      - name: Build Archon UI
        run: npm --prefix "frameworks/archon-ui" run build

      - name: Install frontend dependencies
        run: npm --prefix "system/agency-campaign-os/AgencyCampaign/AgencyCampaign.Web" ci

      - name: Build frontend
        run: npm --prefix "system/agency-campaign-os/AgencyCampaign/AgencyCampaign.Web" run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: system/agency-campaign-os
          file: system/agency-campaign-os/deploy/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE }}:${{ github.sha }}
          build-contexts: |
            archon-framework=frameworks/archon-framework

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: system/agency-campaign-os
          file: system/agency-campaign-os/deploy/docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://kanvas.mainstay.com.br/api
            VITE_IDENTITY_MANAGEMENT_URL=https://auth.mainstay.com.br
            VITE_OIDC_CLIENT_ID=agency-campaign-prod
          build-contexts: |
            archon-ui=frameworks/archon-ui

      - name: Copy deploy assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "system/agency-campaign-os/deploy/docker-compose.prod.yml"
          target: "/var/www/kanvas"
          strip_components: 3

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            mkdir -p /var/www/kanvas/config
            cd /var/www/kanvas
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
