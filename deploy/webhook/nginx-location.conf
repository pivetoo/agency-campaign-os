# Adicionar dentro do server {} (porta 443) do vhost kanvas.mainstay.com.br.
# Publica o receiver de deploy (so escuta em 127.0.0.1:9876) protegido por token.
location = /deploy-hook {
    proxy_pass http://127.0.0.1:9876/deploy-hook;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
}
